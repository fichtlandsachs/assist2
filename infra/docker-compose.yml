networks:
  proxy:
    name: assist-proxy
    external: true
  internal:
    name: assist2-internal
    driver: bridge
    internal: true

volumes:
  assist2_postgres_data:
  assist2_redis_data:
  assist2_n8n_data:
  assist2_authentik_db_data:
  assist2_authentik_media:
  assist2_authentik_templates:
  assist2_pdf_templates:
  assist2_pdf_cache:
  assist2_nextcloud_data:
  assist2_litellm_db_data:
  assist2_nextcloud_db_data:
  assist2_openwebui_data:
  assist2_pgadmin_data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: assist2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - assist2_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: assist2-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - assist2_redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-db:
    image: postgres:16-alpine
    container_name: assist2-authentik-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
    volumes:
      - assist2_authentik_db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.10.5
    container_name: assist2-authentik-server
    restart: unless-stopped
    command: server
    deploy:
      resources:
        limits:
          cpus: "0.8"
          memory: 600M
    environment:
      AUTHENTIK_REDIS__HOST: assist2-redis
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}
      AUTHENTIK_REDIS__DB: 1
      AUTHENTIK_POSTGRESQL__HOST: assist2-authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_LOG_LEVEL: info
    volumes:
      - assist2_authentik_media:/media
      - assist2_authentik_templates:/templates
    networks:
      - proxy
      - internal
    depends_on:
      authentik-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`authentik.${DOMAIN}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls.certresolver=letsencrypt"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD-SHELL", "ak healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.10.5
    container_name: assist2-authentik-worker
    restart: unless-stopped
    command: worker
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    environment:
      AUTHENTIK_REDIS__HOST: assist2-redis
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}
      AUTHENTIK_REDIS__DB: 1
      AUTHENTIK_POSTGRESQL__HOST: assist2-authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_LOG_LEVEL: info
      AUTHENTIK_WORKER_MULTIPLIER: "1"
    volumes:
      - assist2_authentik_media:/media
      - assist2_authentik_templates:/templates
    networks:
      - internal
    depends_on:
      authentik-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: assist2-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@assist2-postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@assist2-redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      ENVIRONMENT: ${ENVIRONMENT}
      CORS_ORIGINS: ${CORS_ORIGINS}
      N8N_WEBHOOK_URL: http://assist2-n8n:5678
      N8N_API_KEY: ${N8N_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AUTHENTIK_URL: http://assist2-authentik-server:9000
      AUTHENTIK_API_TOKEN: ${AUTHENTIK_API_TOKEN}
      AUTHENTIK_BACKEND_CLIENT_ID: ${AUTHENTIK_BACKEND_CLIENT_ID}
      AUTHENTIK_BACKEND_CLIENT_SECRET: ${AUTHENTIK_BACKEND_CLIENT_SECRET}
      AUTHENTIK_JWKS_URL: ${AUTHENTIK_JWKS_URL}
      AUTHENTIK_APP_SLUG: ${AUTHENTIK_APP_SLUG:-backend}
      AUTHENTIK_ADMIN_CLIENT_ID: ${AUTHENTIK_ADMIN_CLIENT_ID}
      STIRLING_PDF_URL: ${STIRLING_PDF_URL:-http://assist2-stirling-pdf:8080}
      WHISPER_URL: ${WHISPER_URL:-http://assist2-whisper:9000}
      LITELLM_URL: ${LITELLM_URL:-http://assist2-litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      IONOS_API_KEY: ${IONOS_API_KEY:-}
      IONOS_API_BASE: ${IONOS_API_BASE:-https://openai.inference.de-txl.ionos.com/v1}
      IONOS_MODEL_CACHE_TTL: ${IONOS_MODEL_CACHE_TTL:-300}
      PROVIDER_ROUTING_SUGGEST: ${PROVIDER_ROUTING_SUGGEST:-auto}
      PROVIDER_ROUTING_DOCS: ${PROVIDER_ROUTING_DOCS:-claude-sonnet-4-6}
      PROVIDER_ROUTING_FALLBACK: ${PROVIDER_ROUTING_FALLBACK:-ionos-fast}
      AI_FEATURE_FLAGS: ${AI_FEATURE_FLAGS:-streaming,embeddings}
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:-https://nextcloud.heykarl.app}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_APP_PASSWORD: ${NEXTCLOUD_ADMIN_APP_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL:-https://heykarl.app}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-https://heykarl.app/api/v1/auth/github/callback}
      ATLASSIAN_REDIRECT_URI: ${ATLASSIAN_REDIRECT_URI:-https://heykarl.app/api/v1/auth/atlassian/callback}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-info@heykarl.app}
      CONTACT_EMAIL_TO: ${CONTACT_EMAIL_TO:-info@heykarl.app}
    networks:
      - proxy
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: assist2-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@assist2-postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@assist2-redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      N8N_WEBHOOK_URL: http://assist2-n8n:5678
      N8N_API_KEY: ${N8N_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STIRLING_PDF_URL: ${STIRLING_PDF_URL:-http://assist2-stirling-pdf:8080}
      WHISPER_URL: ${WHISPER_URL:-http://assist2-whisper:9000}
      LITELLM_URL: ${LITELLM_URL:-http://assist2-litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      IONOS_API_KEY: ${IONOS_API_KEY:-}
      IONOS_API_BASE: ${IONOS_API_BASE:-https://openai.inference.de-txl.ionos.com/v1}
      IONOS_MODEL_CACHE_TTL: ${IONOS_MODEL_CACHE_TTL:-300}
      PROVIDER_ROUTING_SUGGEST: ${PROVIDER_ROUTING_SUGGEST:-auto}
      PROVIDER_ROUTING_DOCS: ${PROVIDER_ROUTING_DOCS:-claude-sonnet-4-6}
      PROVIDER_ROUTING_FALLBACK: ${PROVIDER_ROUTING_FALLBACK:-ionos-fast}
      AI_FEATURE_FLAGS: ${AI_FEATURE_FLAGS:-streaming,embeddings}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  langgraph-service:
    image: assist2-langgraph
    build:
      context: ../langgraph-service
      dockerfile: Dockerfile
    container_name: assist2-langgraph
    restart: unless-stopped
    environment:
      LITELLM_BASE_URL: http://assist2-litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-assist2}
      BACKEND_BASE_URL: http://assist2-backend:8000
      LANGGRAPH_API_KEY: ${LANGGRAPH_API_KEY:-dev-langgraph-secret}
      LOG_LEVEL: INFO
    networks:
      - internal
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://heykarl.app
        NEXT_PUBLIC_APP_URL: https://heykarl.app
    container_name: assist2-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://heykarl.app
      NEXT_PUBLIC_APP_URL: https://heykarl.app
    networks:
      - proxy
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  admin-frontend:
    build:
      context: ../admin-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://heykarl.app
        NEXT_PUBLIC_AUTHENTIK_URL: https://authentik.heykarl.app
        NEXT_PUBLIC_ADMIN_CLIENT_ID: ${AUTHENTIK_ADMIN_CLIENT_ID}
        NEXT_PUBLIC_ADMIN_REDIRECT_URI: https://admin.heykarl.app/callback
    container_name: assist2-admin
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.heykarl.app`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: assist2-litellm
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      IONOS_API_KEY: ${IONOS_API_KEY:-}
      IONOS_API_BASE: ${IONOS_API_BASE:-https://openai.inference.de-txl.ionos.com/v1}
      LITELLM_MASTER_KEY: ${LITELLM_API_KEY:-sk-assist2}
      DATABASE_URL: postgresql://litellm:${LITELLM_DB_PASSWORD}@assist2-litellm-postgres:5432/litellm_db
      SERVER_ROOT_PATH: /litellm
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD}
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro
    networks:
      - proxy
      - internal
    depends_on:
      litellm-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      # Main route: /litellm prefix
      - "traefik.http.routers.litellm.rule=Host(`admin.heykarl.app`) && PathPrefix(`/litellm`)"
      - "traefik.http.routers.litellm.entrypoints=websecure"
      - "traefik.http.routers.litellm.tls.certresolver=letsencrypt"
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"
      # Redirect /ui and /sso (LiteLLM ignores SERVER_ROOT_PATH on some redirects)
      - "traefik.http.routers.litellm-fix.rule=Host(`admin.heykarl.app`) && (PathPrefix(`/ui`) || PathPrefix(`/sso`))"
      - "traefik.http.routers.litellm-fix.entrypoints=websecure"
      - "traefik.http.routers.litellm-fix.tls.certresolver=letsencrypt"
      - "traefik.http.routers.litellm-fix.middlewares=litellm-prefix@docker"
      - "traefik.http.routers.litellm-fix.service=litellm@docker"
      - "traefik.http.middlewares.litellm-prefix.addprefix.prefix=/litellm"
      - "traefik.docker.network=assist-proxy"

  litellm-postgres:
    image: postgres:16-alpine
    container_name: assist2-litellm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm_db
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - assist2_litellm_db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  n8n:
    image: n8nio/n8n:1.51.1
    container_name: assist2-n8n
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.8"
          memory: 512M
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: assist2-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: admin.${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_PATH: /n8n/
      WEBHOOK_URL: https://admin.${DOMAIN}/n8n/
      N8N_API_KEY: ${N8N_API_KEY}
      N8N_LOG_LEVEL: info
    volumes:
      - assist2_n8n_data:/home/node/.n8n
    networks:
      - proxy
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: assist2-stirling-pdf
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 700M
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      SECURITY_ENABLELOGIN: "false"
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "true"
    volumes:
      - assist2_pdf_templates:/app/pdf_templates
      - assist2_pdf_cache:/app/pdf_cache
    networks:
      - internal
      - proxy

  nextcloud-db:
    image: mariadb:10.11
    container_name: assist2-nextcloud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${NEXTCLOUD_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - assist2_nextcloud_db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nextcloud:
    image: nextcloud:28-apache
    container_name: assist2-nextcloud
    restart: unless-stopped
    environment:
      NEXTCLOUD_TRUSTED_DOMAINS: nextcloud.${DOMAIN} admin.${DOMAIN}
      OVERWRITEHOST: admin.${DOMAIN}
      OVERWRITEPROTOCOL: https
      OVERWRITEWEBROOT: /nextcloud
      OVERWRITECLIURL: https://admin.${DOMAIN}/nextcloud
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_PROXIES: "172.16.0.0/12 10.0.0.0/8"
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - assist2_nextcloud_data:/var/www/html
    networks:
      - proxy
      - internal
    depends_on:
      nextcloud-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`admin.${DOMAIN}`) && PathPrefix(`/nextcloud`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls.certresolver=letsencrypt"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      - "traefik.docker.network=assist-proxy"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: assist2-whisper
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 900M
    entrypoint: ["/app/.venv/bin/python", "-c", "import uvicorn; from app.webservice import app; uvicorn.run(app, host='0.0.0.0', port=9000, root_path='/whisper')"]
    environment:
      ASR_MODEL: small
      ASR_ENGINE: faster_whisper
      ASR_QUANTIZATION: int8
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whisper.rule=Host(`admin.heykarl.app`) && PathPrefix(`/whisper`)"
      - "traefik.http.routers.whisper.entrypoints=websecure"
      - "traefik.http.routers.whisper.tls.certresolver=letsencrypt"
      - "traefik.http.services.whisper.loadbalancer.server.port=9000"
      - "traefik.docker.network=assist-proxy"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: assist2-pgadmin
    restart: "no"
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      SCRIPT_NAME: /pgadmin
    volumes:
      - assist2_pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - internal
      - proxy

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: assist2-phpmyadmin
    restart: "no"
    profiles: ["tools"]
    environment:
      PMA_HOST: assist2-nextcloud-db
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: https://admin.heykarl.app/phpmyadmin/
    networks:
      - internal
      - proxy

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: assist2-redis-commander
    restart: "no"
    profiles: ["tools"]
    environment:
      REDIS_HOST: assist2-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      URL_PREFIX: /redis
      HTTP_USER: admin
      HTTP_PASSWORD: ${PGADMIN_PASSWORD}
    networks:
      - internal
      - proxy

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: assist2-openwebui
    restart: "no"
    profiles: ["optional"]
    environment:
      OPENAI_API_BASE_URL: http://assist2-litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_API_KEY:-sk-assist2}
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY}
      ENABLE_OLLAMA_API: "false"
      ENABLE_SIGNUP: "false"
      WEBUI_AUTH: "false"
      DEFAULT_USER_ROLE: user
      WEBUI_NAME: "Assist2 Chat"
    volumes:
      - assist2_openwebui_data:/app/backend/data
    networks:
      - proxy
      - internal
    depends_on:
      - litellm
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

