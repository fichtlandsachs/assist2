networks:
  proxy:
    name: assist-proxy
    external: true
  internal:
    name: heykarl-internal
    driver: bridge
    internal: true

volumes:
  assist2_postgres_data:
  heykarl_postgres_data:
  heykarl_redis_data:
  heykarl_n8n_data:
  heykarl_authentik_db_data:
  heykarl_authentik_media:
  heykarl_authentik_templates:
  heykarl_pdf_templates:
  heykarl_pdf_cache:
  heykarl_nextcloud_data:
  heykarl_litellm_db_data:
  heykarl_nextcloud_db_data:
  heykarl_openwebui_data:
  heykarl_pgadmin_data:
  heykarl_vscode_config:

services:
  postgres:
    image: pgvector/pgvector:pg16
    pull_policy: never
    container_name: heykarl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - assist2_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    pull_policy: never
    container_name: heykarl-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - heykarl_redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-db:
    image: postgres:16-alpine
    pull_policy: never
    container_name: heykarl-authentik-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
    volumes:
      - heykarl_authentik_db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.10.5
    pull_policy: never
    container_name: heykarl-authentik-server
    restart: unless-stopped
    command: server
    deploy:
      resources:
        limits:
          cpus: "0.8"
          memory: 768M
    environment:
      AUTHENTIK_REDIS__HOST: heykarl-redis
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}
      AUTHENTIK_REDIS__DB: 1
      AUTHENTIK_POSTGRESQL__HOST: heykarl-authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_LOG_LEVEL: info
    volumes:
      - heykarl_authentik_media:/media
      - heykarl_authentik_templates:/templates
    networks:
      - proxy
      - internal
    depends_on:
      authentik-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`authentik.${DOMAIN}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls.certresolver=letsencrypt"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD-SHELL", "ak healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.10.5
    pull_policy: never
    container_name: heykarl-authentik-worker
    restart: unless-stopped
    command: worker
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    environment:
      AUTHENTIK_REDIS__HOST: heykarl-redis
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}
      AUTHENTIK_REDIS__DB: 1
      AUTHENTIK_POSTGRESQL__HOST: heykarl-authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_LOG_LEVEL: info
      AUTHENTIK_WORKER_MULTIPLIER: "1"
    volumes:
      - heykarl_authentik_media:/media
      - heykarl_authentik_templates:/templates
    networks:
      - internal
    depends_on:
      authentik-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: heykarl-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@heykarl-postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@heykarl-redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      ENVIRONMENT: ${ENVIRONMENT}
      CORS_ORIGINS: ${CORS_ORIGINS}
      N8N_WEBHOOK_URL: http://heykarl-n8n:5678
      N8N_API_KEY: ${N8N_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AUTHENTIK_URL: http://heykarl-authentik-server:9000
      AUTHENTIK_API_TOKEN: ${AUTHENTIK_API_TOKEN}
      AUTHENTIK_BACKEND_CLIENT_ID: ${AUTHENTIK_BACKEND_CLIENT_ID}
      AUTHENTIK_BACKEND_CLIENT_SECRET: ${AUTHENTIK_BACKEND_CLIENT_SECRET}
      AUTHENTIK_JWKS_URL: ${AUTHENTIK_JWKS_URL}
      AUTHENTIK_APP_SLUG: ${AUTHENTIK_APP_SLUG:-backend}
      AUTHENTIK_ADMIN_CLIENT_ID: ${AUTHENTIK_ADMIN_CLIENT_ID}
      STIRLING_PDF_URL: ${STIRLING_PDF_URL:-http://heykarl-stirling-pdf:8080}
      WHISPER_URL: ${WHISPER_URL:-http://heykarl-whisper:9000}
      LITELLM_URL: ${LITELLM_URL:-http://heykarl-litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      IONOS_API_KEY: ${IONOS_API_KEY:-}
      IONOS_API_BASE: ${IONOS_API_BASE:-https://openai.inference.de-txl.ionos.com/v1}
      IONOS_MODEL_CACHE_TTL: ${IONOS_MODEL_CACHE_TTL:-300}
      PROVIDER_ROUTING_SUGGEST: ${PROVIDER_ROUTING_SUGGEST:-auto}
      PROVIDER_ROUTING_DOCS: ${PROVIDER_ROUTING_DOCS:-claude-sonnet-4-6}
      PROVIDER_ROUTING_FALLBACK: ${PROVIDER_ROUTING_FALLBACK:-ionos-fast}
      AI_FEATURE_FLAGS: ${AI_FEATURE_FLAGS:-streaming,embeddings}
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:-https://nextcloud.heykarl.app}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_APP_PASSWORD: ${NEXTCLOUD_ADMIN_APP_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL:-https://heykarl.app}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-https://heykarl.app/api/v1/auth/github/callback}
      ATLASSIAN_CLIENT_ID: ${ATLASSIAN_CLIENT_ID:-}
      ATLASSIAN_CLIENT_SECRET: ${ATLASSIAN_CLIENT_SECRET:-}
      ATLASSIAN_REDIRECT_URI: ${ATLASSIAN_REDIRECT_URI:-https://heykarl.app/api/v1/auth/atlassian/callback}
      ATLASSIAN_SCOPES: ${ATLASSIAN_SCOPES:-read:me read:jira-work write:jira-work read:jira-user offline_access}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-info@heykarl.app}
      CONTACT_EMAIL_TO: ${CONTACT_EMAIL_TO:-info@heykarl.app}
    networks:
      - proxy
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: heykarl-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 320M
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@heykarl-postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@heykarl-redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      N8N_WEBHOOK_URL: http://heykarl-n8n:5678
      N8N_API_KEY: ${N8N_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STIRLING_PDF_URL: ${STIRLING_PDF_URL:-http://heykarl-stirling-pdf:8080}
      WHISPER_URL: ${WHISPER_URL:-http://heykarl-whisper:9000}
      LITELLM_URL: ${LITELLM_URL:-http://heykarl-litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      IONOS_API_KEY: ${IONOS_API_KEY:-}
      IONOS_API_BASE: ${IONOS_API_BASE:-https://openai.inference.de-txl.ionos.com/v1}
      IONOS_MODEL_CACHE_TTL: ${IONOS_MODEL_CACHE_TTL:-300}
      PROVIDER_ROUTING_SUGGEST: ${PROVIDER_ROUTING_SUGGEST:-auto}
      PROVIDER_ROUTING_DOCS: ${PROVIDER_ROUTING_DOCS:-claude-sonnet-4-6}
      PROVIDER_ROUTING_FALLBACK: ${PROVIDER_ROUTING_FALLBACK:-ionos-fast}
      AI_FEATURE_FLAGS: ${AI_FEATURE_FLAGS:-streaming,embeddings}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: heykarl-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@heykarl-postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@heykarl-redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      N8N_WEBHOOK_URL: http://heykarl-n8n:5678
      N8N_API_KEY: ${N8N_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LITELLM_URL: ${LITELLM_URL:-http://heykarl-litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy

  langgraph-service:
    image: heykarl-langgraph
    build:
      context: ../langgraph-service
      dockerfile: Dockerfile
    container_name: heykarl-langgraph
    restart: unless-stopped
    environment:
      LITELLM_BASE_URL: http://heykarl-litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-heykarl}
      BACKEND_BASE_URL: http://heykarl-backend:8000
      LANGGRAPH_API_KEY: ${LANGGRAPH_API_KEY:-dev-langgraph-secret}
      LOG_LEVEL: INFO
    networks:
      - internal
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://heykarl.app
        NEXT_PUBLIC_APP_URL: https://heykarl.app
    container_name: heykarl-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://heykarl.app
      NEXT_PUBLIC_APP_URL: https://heykarl.app
    networks:
      - proxy
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  admin-frontend:
    build:
      context: ../admin-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://heykarl.app
        NEXT_PUBLIC_AUTHENTIK_URL: https://authentik.heykarl.app
        NEXT_PUBLIC_ADMIN_CLIENT_ID: ${AUTHENTIK_ADMIN_CLIENT_ID}
        NEXT_PUBLIC_ADMIN_REDIRECT_URI: https://admin.heykarl.app/callback
    container_name: heykarl-admin
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.heykarl.app`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    pull_policy: never
    container_name: heykarl-litellm
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      IONOS_API_KEY: ${IONOS_API_KEY:-}
      IONOS_API_BASE: ${IONOS_API_BASE:-https://openai.inference.de-txl.ionos.com/v1}
      LITELLM_MASTER_KEY: ${LITELLM_API_KEY:-sk-heykarl}
      DATABASE_URL: postgresql://litellm:${LITELLM_DB_PASSWORD}@heykarl-litellm-postgres:5432/litellm_db
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SERVER_ROOT_PATH: /litellm
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD}
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro
    networks:
      - proxy
      - internal
    depends_on:
      litellm-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      # Main route: /litellm prefix
      - "traefik.http.routers.litellm.rule=Host(`admin.heykarl.app`) && PathPrefix(`/litellm`)"
      - "traefik.http.routers.litellm.entrypoints=websecure"
      - "traefik.http.routers.litellm.tls.certresolver=letsencrypt"
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"
      # Redirect /ui and /sso (LiteLLM ignores SERVER_ROOT_PATH on some redirects)
      - "traefik.http.routers.litellm-fix.rule=Host(`admin.heykarl.app`) && (PathPrefix(`/ui`) || PathPrefix(`/sso`))"
      - "traefik.http.routers.litellm-fix.entrypoints=websecure"
      - "traefik.http.routers.litellm-fix.tls.certresolver=letsencrypt"
      - "traefik.http.routers.litellm-fix.middlewares=litellm-prefix@docker"
      - "traefik.http.routers.litellm-fix.service=litellm@docker"
      - "traefik.http.middlewares.litellm-prefix.addprefix.prefix=/litellm"
      - "traefik.docker.network=assist-proxy"

  litellm-postgres:
    image: postgres:16-alpine
    pull_policy: never
    container_name: heykarl-litellm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm_db
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - heykarl_litellm_db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  n8n:
    image: n8nio/n8n:1.51.1
    pull_policy: never
    container_name: heykarl-n8n
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.8"
          memory: 256M
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: heykarl-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: admin.${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_PATH: /n8n/
      WEBHOOK_URL: https://admin.${DOMAIN}/n8n/
      N8N_API_KEY: ${N8N_API_KEY}
      N8N_LOG_LEVEL: info
    volumes:
      - heykarl_n8n_data:/home/node/.n8n
    networks:
      - proxy
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    pull_policy: never
    container_name: heykarl-stirling-pdf
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1400M
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      SECURITY_ENABLELOGIN: "false"
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "true"
    volumes:
      - heykarl_pdf_templates:/app/pdf_templates
      - heykarl_pdf_cache:/app/pdf_cache
    networks:
      - internal
      - proxy

  nextcloud-db:
    image: mariadb:10.11
    pull_policy: never
    container_name: heykarl-nextcloud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${NEXTCLOUD_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - heykarl_nextcloud_db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nextcloud:
    image: nextcloud:28-apache
    pull_policy: never
    container_name: heykarl-nextcloud
    restart: unless-stopped
    environment:
      NEXTCLOUD_TRUSTED_DOMAINS: nextcloud.${DOMAIN} admin.${DOMAIN}
      OVERWRITEHOST: admin.${DOMAIN}
      OVERWRITEPROTOCOL: https
      OVERWRITEWEBROOT: /nextcloud
      OVERWRITECLIURL: https://admin.${DOMAIN}/nextcloud
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_PROXIES: "172.16.0.0/12 10.0.0.0/8"
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - heykarl_nextcloud_data:/var/www/html
    networks:
      - proxy
      - internal
    depends_on:
      nextcloud-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`admin.${DOMAIN}`) && PathPrefix(`/nextcloud`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls.certresolver=letsencrypt"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      - "traefik.docker.network=assist-proxy"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    pull_policy: never
    container_name: heykarl-whisper
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 600M
    entrypoint: ["/app/.venv/bin/python", "-c", "import uvicorn; from app.webservice import app; uvicorn.run(app, host='0.0.0.0', port=9000, root_path='/whisper')"]
    environment:
      ASR_MODEL: small
      ASR_ENGINE: faster_whisper
      ASR_QUANTIZATION: int8
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=false"

  pgadmin:
    image: dpage/pgadmin4:latest
    pull_policy: never
    container_name: heykarl-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      SCRIPT_NAME: /pgadmin
    volumes:
      - heykarl_pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`admin.heykarl.app`) && PathPrefix(`/pgadmin`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    pull_policy: never
    container_name: heykarl-phpmyadmin
    restart: "no"
    profiles: ["tools"]
    environment:
      PMA_HOST: heykarl-nextcloud-db
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: https://admin.heykarl.app/phpmyadmin/
    networks:
      - internal
      - proxy

  redis-commander:
    image: rediscommander/redis-commander:latest
    pull_policy: never
    container_name: heykarl-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOST: heykarl-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      URL_PREFIX: /redis
      HTTP_USER: admin
      HTTP_PASSWORD: ${PGADMIN_PASSWORD}
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redis-commander.rule=Host(`admin.heykarl.app`) && PathPrefix(`/redis`)"
      - "traefik.http.routers.redis-commander.entrypoints=websecure"
      - "traefik.http.routers.redis-commander.tls.certresolver=letsencrypt"
      - "traefik.http.services.redis-commander.loadbalancer.server.port=8081"

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    pull_policy: never
    container_name: heykarl-openwebui
    restart: "no"
    profiles: ["optional"]
    environment:
      OPENAI_API_BASE_URL: http://heykarl-litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_API_KEY:-sk-heykarl}
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY}
      ENABLE_OLLAMA_API: "false"
      ENABLE_SIGNUP: "false"
      WEBUI_AUTH: "false"
      DEFAULT_USER_ROLE: user
      WEBUI_NAME: "Karl Chat"
    volumes:
      - heykarl_openwebui_data:/app/backend/data
    networks:
      - proxy
      - internal
    depends_on:
      - litellm
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  vscode:
    image: gitpod/openvscode-server:latest
    pull_policy: never
    container_name: heykarl-vscode
    restart: unless-stopped
    user: root
    entrypoint: ["/home/.openvscode-server/bin/openvscode-server", "--host", "0.0.0.0", "--server-base-path", "/code", "--without-connection-token", "--user-data-dir", "/config", "/opt"]
    volumes:
      - /opt:/opt
      - heykarl_vscode_config:/config
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vscode.rule=Host(`admin.${DOMAIN}`) && PathPrefix(`/code`)"
      - "traefik.http.routers.vscode.entrypoints=websecure"
      - "traefik.http.routers.vscode.tls.certresolver=letsencrypt"
      - "traefik.http.services.vscode.loadbalancer.server.port=3000"
      - "traefik.docker.network=assist-proxy"
