http:
  routers:
    # ── Backend: API ───────────────────────────────────────────────────────
    karl-backend:
      rule: "Host(`heykarl.app`) && PathPrefix(`/api/v1`)"
      entryPoints: [websecure]
      service: karl-backend-svc
      priority: 1000
      tls:
        certResolver: letsencrypt

    # ── Frontend: superadmin panel ────────────────────────────────────────
    karl-superadmin:
      rule: "Host(`heykarl.app`) && PathPrefix(`/superadmin`)"
      entryPoints: [websecure]
      service: karl-frontend-svc
      priority: 600
      tls:
        certResolver: letsencrypt

    # ── Frontend: explicit app routes ──────────────────────────────────────
    karl-frontend-routes:
      rule: "Host(`heykarl.app`) && (PathPrefix(`/_next`) || PathPrefix(`/login`) || PathPrefix(`/register`) || PathPrefix(`/setup`) || PathPrefix(`/karl-`) || Path(`/site.webmanifest`) || Path(`/favicon.ico`))"
      entryPoints: [websecure]
      service: karl-frontend-svc
      priority: 500
      tls:
        certResolver: letsencrypt

    # ── Frontend: org workspace routes (depth >= 2, e.g. /muster-gmbh/dashboard)
    karl-frontend-org:
      rule: "Host(`heykarl.app`) && PathRegexp(`^/[a-z0-9][a-z0-9-]{0,48}/.`)"
      entryPoints: [websecure]
      service: karl-frontend-svc
      priority: 300
      tls:
        certResolver: letsencrypt

    # ── Ghost: protect admin and media from org regex match ───────────────
    ghost-protected:
      rule: "Host(`heykarl.app`) && (PathPrefix(`/ghost`) || PathPrefix(`/content`) || PathPrefix(`/assets`))"
      entryPoints: [websecure]
      service: ghost-svc
      priority: 500
      tls:
        certResolver: letsencrypt

    # ── Authentik forward-auth outpost ────────────────────────────────────
    authentik-outpost:
      rule: "HostRegexp(`[a-z0-9-]+\\.fichtlworks\\.com`) && PathPrefix(`/outpost.goauthentik.io/`)"
      entryPoints: [websecure]
      service: authentik-outpost-svc
      tls:
        certResolver: letsencrypt

  middlewares:
    # forward-auth middleware (used by traefik dashboard and other fichtlworks services)
    authentik:
      forwardAuth:
        address: "http://assist2-authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

  services:
    karl-frontend-svc:
      loadBalancer:
        servers:
          - url: "http://assist2-frontend:3000"

    karl-backend-svc:
      loadBalancer:
        servers:
          - url: "http://assist2-backend:8000"

    ghost-svc:
      loadBalancer:
        servers:
          - url: "http://ghost:2368"

    authentik-outpost-svc:
      loadBalancer:
        servers:
          - url: "http://assist2-authentik-server:9000"
