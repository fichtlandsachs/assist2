http:
  routers:
    # ── Backend: API ───────────────────────────────────────────────────────
    karl-backend:
      rule: "Host(`heykarl.app`) && PathPrefix(`/api/v1`)"
      entryPoints: [websecure]
      service: karl-backend-svc
      priority: 1000
      tls:
        certResolver: letsencrypt

    # ── Frontend: superadmin panel ────────────────────────────────────────
    karl-superadmin:
      rule: "Host(`heykarl.app`) && PathPrefix(`/superadmin`)"
      entryPoints: [websecure]
      service: karl-frontend-svc
      priority: 600
      tls:
        certResolver: letsencrypt

    # ── Frontend: explicit app routes ──────────────────────────────────────
    karl-frontend-routes:
      rule: "Host(`heykarl.app`) && (PathPrefix(`/_next`) || PathPrefix(`/login`) || PathPrefix(`/register`) || PathPrefix(`/setup`) || PathPrefix(`/demo`) || PathPrefix(`/karl-`) || Path(`/site.webmanifest`) || Path(`/favicon.ico`))"
      entryPoints: [websecure]
      service: karl-frontend-svc
      priority: 500
      tls:
        certResolver: letsencrypt

    # ── Frontend: org workspace routes (depth >= 2, e.g. /muster-gmbh/dashboard)
    karl-frontend-org:
      rule: "Host(`heykarl.app`) && PathRegexp(`^/[a-z0-9][a-z0-9-]{0,48}/.`)"
      entryPoints: [websecure]
      service: karl-frontend-svc
      priority: 300
      tls:
        certResolver: letsencrypt

    # ── Ghost: protect admin and media from org regex match ───────────────
    ghost-protected:
      rule: "Host(`heykarl.app`) && (PathPrefix(`/ghost`) || PathPrefix(`/content`) || PathPrefix(`/assets`))"
      entryPoints: [websecure]
      service: ghost-svc
      middlewares: [ghost-strip-trailing-slash]
      priority: 500
      tls:
        certResolver: letsencrypt

    # ── Authentik forward-auth outpost ────────────────────────────────────
    authentik-outpost:
      rule: "HostRegexp(`[a-z0-9-]+\\.fichtlworks\\.com`) && PathPrefix(`/outpost.goauthentik.io/`)"
      entryPoints: [websecure]
      service: authentik-outpost-svc
      tls:
        certResolver: letsencrypt

    # ── Authentik outpost callbacks auf admin.heykarl.app ────────────────
    authentik-outpost-admin:
      rule: "Host(`admin.heykarl.app`) && PathPrefix(`/outpost.goauthentik.io/`)"
      entryPoints: [websecure]
      service: authentik-outpost-svc
      priority: 200
      tls:
        certResolver: letsencrypt

    # ── Whisper ASR ───────────────────────────────────────────────────────
    whisper:
      rule: "Host(`admin.heykarl.app`) && PathPrefix(`/whisper`)"
      entryPoints: [websecure]
      service: whisper-svc
      middlewares: [whisper-strip]
      priority: 100
      tls:
        certResolver: letsencrypt

    # ── Stirling PDF ─────────────────────────────────────────────────────
    stirling-pdf:
      rule: "Host(`admin.heykarl.app`) && PathPrefix(`/pdf`)"
      entryPoints: [websecure]
      service: stirling-pdf-svc
      priority: 100
      tls:
        certResolver: letsencrypt

    # ── pgAdmin ───────────────────────────────────────────────────────────
    pgadmin:
      rule: "Host(`admin.heykarl.app`) && PathPrefix(`/pgadmin`)"
      entryPoints: [websecure]
      service: pgadmin-svc
      priority: 100
      tls:
        certResolver: letsencrypt

    # ── Redis Commander ───────────────────────────────────────────────────
    redis-commander:
      rule: "Host(`admin.heykarl.app`) && PathPrefix(`/redis`)"
      entryPoints: [websecure]
      service: redis-commander-svc
      priority: 100
      tls:
        certResolver: letsencrypt

    # ── phpMyAdmin: redirect bare path to trailing-slash ─────────────────
    phpmyadmin-redirect:
      rule: "Host(`admin.heykarl.app`) && Path(`/phpmyadmin`)"
      entryPoints: [websecure]
      service: phpmyadmin-svc
      middlewares: [phpmyadmin-slash]
      priority: 110
      tls:
        certResolver: letsencrypt

    # ── phpMyAdmin ────────────────────────────────────────────────────────
    phpmyadmin:
      rule: "Host(`admin.heykarl.app`) && PathPrefix(`/phpmyadmin/`)"
      entryPoints: [websecure]
      service: phpmyadmin-svc
      middlewares: [phpmyadmin-strip]
      priority: 100
      tls:
        certResolver: letsencrypt

  middlewares:
    ghost-strip-trailing-slash:
      replacePathRegex:
        regex: "^(/(?:assets|content|ghost)/.+)/$"
        replacement: "${1}"

    whisper-strip:
      stripPrefix:
        prefixes:
          - /whisper

    phpmyadmin-strip:
      stripPrefix:
        prefixes:
          - /phpmyadmin

    phpmyadmin-slash:
      redirectRegex:
        regex: "^https://admin\\.heykarl\\.app/phpmyadmin$"
        replacement: "https://admin.heykarl.app/phpmyadmin/"
        permanent: false

    # forward-auth middleware (used by traefik dashboard and other fichtlworks services)
    authentik:
      forwardAuth:
        address: "http://heykarl-authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

  services:
    karl-frontend-svc:
      loadBalancer:
        servers:
          - url: "http://heykarl-frontend:3000"

    karl-backend-svc:
      loadBalancer:
        servers:
          - url: "http://heykarl-backend:8000"

    ghost-svc:
      loadBalancer:
        servers:
          - url: "http://ghost:2368"

    authentik-outpost-svc:
      loadBalancer:
        servers:
          - url: "http://heykarl-authentik-server:9000"

    whisper-svc:
      loadBalancer:
        servers:
          - url: "http://heykarl-whisper:9000"

    phpmyadmin-svc:
      loadBalancer:
        servers:
          - url: "http://heykarl-phpmyadmin:80"

    stirling-pdf-svc:
      loadBalancer:
        servers:
          - url: "http://heykarl-stirling-pdf:8080"

    pgadmin-svc:
      loadBalancer:
        servers:
          - url: "http://heykarl-pgadmin:80"

    redis-commander-svc:
      loadBalancer:
        servers:
          - url: "http://heykarl-redis-commander:8081"
